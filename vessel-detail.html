<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vessel Detail · Maritime HQ</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060e18;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}

    /* TOPBAR */
    .vd-top{background:#0a1628;border-bottom:1px solid #1a2e45;padding:12px 20px;
      display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .vd-back{color:#38bdf8;text-decoration:none;font-size:0.85rem}
    .vd-back:hover{color:#7dd3fc}
    .vd-title{font-size:1.05rem;font-weight:700}
    .vd-badge{font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:20px}
    .b-red   {background:rgba(239,68,68,.15);color:#ef4444}
    .b-yellow{background:rgba(245,158,11,.15);color:#f59e0b}
    .b-green {background:rgba(34,197,94,.15);color:#22c55e}
    .vd-sync{margin-left:auto;font-size:0.72rem;color:#64748b}

    /* SEZIONE NAVE */
    .vessel-info{padding:16px 20px;border-bottom:1px solid #1a2e45;
      display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:600px){.vessel-info{grid-template-columns:1fr}}

    .vi-card{background:#0b1623;border:1px solid #1a2e45;border-radius:10px;padding:14px}
    .vi-card h3{font-size:0.65rem;color:#475569;text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:10px}

    .vi-row{display:flex;justify-content:space-between;align-items:center;
      padding:5px 0;border-bottom:1px solid #0f1d2e;font-size:0.78rem}
    .vi-row:last-child{border-bottom:none}
    .vi-lbl{color:#64748b}
    .vi-val{font-weight:600;color:#e2e8f0;text-align:right}
    .vi-val.green{color:#4ade80}
    .vi-val.yellow{color:#f59e0b}
    .vi-val.red{color:#ef4444}

    /* ETA/ETB/ETD strip */
    .eta-strip{grid-column:1/-1;background:#0b1623;border:1px solid #1a2e45;
      border-radius:10px;padding:14px;display:flex;gap:8px;flex-wrap:wrap}
    .eta-box{flex:1;min-width:100px;background:#060e18;border-radius:8px;
      padding:10px 14px;text-align:center}
    .eta-lbl{font-size:0.6rem;color:#475569;text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:4px}
    .eta-date{font-size:0.88rem;font-weight:700;color:#e2e8f0}
    .eta-time{font-size:0.7rem;color:#64748b;margin-top:2px}
    .eta-box.past .eta-date{color:#ef4444}
    .eta-box.soon .eta-date{color:#f59e0b}
    .eta-box.ok   .eta-date{color:#4ade80}

    /* alerts nave */
    .vessel-alerts{padding:0 20px 12px}
    .va{display:flex;align-items:center;gap:8px;padding:8px 12px;
      border-radius:8px;margin-bottom:6px;font-size:0.78rem}
    .va.crit{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .va.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}

    /* KPI STRIP PROCUREMENT */
    .kpi-strip{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;
      background:#080f1c;border-bottom:1px solid #1a2e45}
    .ks{background:#0b1623;border:1px solid #1a2e45;border-radius:8px;
      padding:8px 14px;min-width:80px;text-align:center;flex-shrink:0}
    .ks-n{font-size:1.5rem;font-weight:800;line-height:1}
    .ks-l{font-size:0.58rem;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
    .ks-bar{height:3px;background:#1e293b;border-radius:2px;margin-top:5px;overflow:hidden}
    .ks-f{height:100%;border-radius:2px}
    .kfb{background:linear-gradient(90deg,#1d4ed8,#3b82f6)}
    .kfg{background:linear-gradient(90deg,#15803d,#22c55e)}
    .kfo{background:linear-gradient(90deg,#c2410c,#f97316)}
    .kfp{background:linear-gradient(90deg,#6d28d9,#a78bfa)}
    .kfgr{background:#334155}

    /* FILTRI */
    .filter-bar{display:flex;gap:6px;padding:10px 20px;flex-wrap:wrap;
      border-bottom:1px solid #1a2e45;background:#080f1c;align-items:center}
    .fb-btn{background:#0b1623;border:1px solid #1a2e45;color:#94a3b8;
      padding:4px 11px;border-radius:20px;font-size:0.7rem;cursor:pointer;
      transition:all .15s;font-family:inherit}
    .fb-btn:hover,.fb-btn.active{background:#1e3a8a;border-color:#3b82f6;color:#93c5fd}
    .fb-btn.fr.active {background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444}
    .fb-btn.fy.active {background:rgba(245,158,11,.2);border-color:#f59e0b;color:#f59e0b}
    .fb-btn.fgg.active{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e}
    .fc{margin-left:auto;font-size:0.7rem;color:#475569}

    /* LISTA ITEMS */
    .items-list{padding:12px 20px;display:flex;flex-direction:column;gap:6px}
    .item-row{background:#0b1623;border:1px solid #1a2e45;border-radius:10px;
      padding:10px 14px;transition:background .1s}
    .item-row:hover{background:#0d1a2a}
    .item-row.hidden-row{display:none}

    /* riga superiore */
    .item-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .item-num{font-size:0.62rem;color:#334155;min-width:22px;text-align:right;flex-shrink:0}
    .item-ids{display:flex;flex-direction:column;flex-shrink:0}
    .item-reqid{font-size:0.6rem;color:#38bdf8;font-weight:600}
    .item-poid {font-size:0.6rem;color:#4ade80;font-weight:600}
    .item-desc{font-size:0.8rem;font-weight:600;color:#cbd5e1;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
    .item-sup{font-size:0.68rem;color:#475569;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;flex-shrink:0}
    .item-date{font-size:0.75rem;font-weight:700;flex-shrink:0;padding-left:8px}
    .del-ok  {color:#4ade80}
    .del-warn{color:#f59e0b}
    .del-late{color:#ef4444}
    .del-none{color:#334155}

    /* pipeline */
    .item-pipe{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .step{display:flex;align-items:center;gap:5px}
    .step-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid}
    .d-none  {background:#1e293b;border-color:#334155}
    .d-blue  {background:#1e3a8a;border-color:#3b82f6}
    .d-green {background:#14532d;border-color:#22c55e}
    .d-yellow{background:#78350f;border-color:#f59e0b}
    .d-red   {background:#7f1d1d;border-color:#ef4444}
    .d-purple{background:#4c1d95;border-color:#a78bfa}
    .d-cyan  {background:#0c4a6e;border-color:#38bdf8}
    .step-lbl{font-size:0.63rem;color:#475569;white-space:nowrap}
    .step-lbl.on{color:#e2e8f0}
    .rfq-wrap{display:flex;align-items:center;gap:4px}
    .rfq-track{width:36px;height:4px;background:#1e293b;border-radius:2px;overflow:hidden}
    .rfq-fill{height:100%;border-radius:2px}
    .rfq-fill.p100{background:linear-gradient(90deg,#15803d,#22c55e)}
    .rfq-fill.p50 {background:linear-gradient(90deg,#c2410c,#f59e0b)}
    .rfq-fill.p0  {background:#334155}
    .rfq-pct{font-size:0.6rem;color:#64748b;min-width:24px}
    .pipe-arr{color:#1e293b;font-size:0.8rem;flex-shrink:0}
    .empty{padding:40px;text-align:center;color:#475569;font-size:0.82rem}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="vd-top">
  <a class="vd-back" href="index.html">← Dashboard</a>
  <span class="vd-title" id="vd-name">—</span>
  <span class="vd-badge" id="vd-badge">—</span>
  <span class="vd-sync" id="vd-sync">—</span>
</div>

<!-- SEZIONE 1: DATI NAVE -->
<div class="vessel-info" id="vessel-info">
  <div class="empty" style="grid-column:1/-1">Caricamento dati nave...</div>
</div>

<!-- ALERTS NAVE -->
<div class="vessel-alerts" id="vessel-alerts"></div>

<!-- SEZIONE 2: KPI PROCUREMENT -->
<div class="kpi-strip">
  <div class="ks">
    <div class="ks-n" style="color:#a5b4fc" id="k-req">—</div>
    <div class="ks-l">REQ tot</div>
    <div class="ks-bar"><div class="ks-f kfp" style="width:100%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#fcd34d" id="k-rfqo">—</div>
    <div class="ks-l">RFQ aperte</div>
    <div class="ks-bar"><div class="ks-f kfb" id="k-rfqo-b" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#ef4444" id="k-over">—</div>
    <div class="ks-l">Scadute &gt;7gg</div>
    <div class="ks-bar"><div class="ks-f kfgr" style="width:100%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#38bdf8" id="k-r2p">—</div>
    <div class="ks-l">REQ→PO %</div>
    <div class="ks-bar"><div class="ks-f kfb" id="k-r2p-b" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#4ade80" id="k-po">—</div>
    <div class="ks-l">PO attivi</div>
    <div class="ks-bar"><div class="ks-f kfg" id="k-po-b" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#f97316" id="k-p2d">—</div>
    <div class="ks-l">PO→DN %</div>
    <div class="ks-bar"><div class="ks-f kfo" id="k-p2d-b" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#7dd3fc" id="k-dn">—</div>
    <div class="ks-l">DN transit</div>
    <div class="ks-bar"><div class="ks-f kfb" id="k-dn-b" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-n" style="color:#d8b4fe" id="k-rdy">—</div>
    <div class="ks-l">Pronti PO</div>
    <div class="ks-bar"><div class="ks-f kfp" style="width:100%"></div></div>
  </div>
</div>

<!-- FILTRI -->
<div class="filter-bar">
  <button class="fb-btn active" data-f="all">Tutti</button>
  <button class="fb-btn fr"     data-f="rfq-open">🔴 RFQ aperte</button>
  <button class="fb-btn fy"     data-f="overdue">⏳ &gt;7gg</button>
  <button class="fb-btn fy"     data-f="ready-po">📋 Pronte PO</button>
  <button class="fb-btn fy"     data-f="po-no-dn">📦 PO senza DN</button>
  <button class="fb-btn fgg"    data-f="dn-transit">🚢 DN transit</button>
  <button class="fb-btn"        data-f="cancelled">🚫 Cancellati</button>
  <span class="fc" id="f-count"></span>
</div>

<!-- LISTA ITEMS -->
<div class="items-list" id="items-list">
  <div class="empty">Caricamento items...</div>
</div>

<script>
const TODAY = new Date();

function fmtDateTime(ds) {
  if (!ds) return '—';
  const d = new Date(ds);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})
    + ' · ' + d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ds) {
  if (!ds) return '—';
  return new Date(ds).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
}
function etaClass(ds) {
  if (!ds) return '';
  const diff = (new Date(ds) - TODAY) / 3600000; // ore
  return diff < 0 ? 'past' : diff < 12 ? 'soon' : 'ok';
}
function delClass(ds) {
  if (!ds) return 'del-none';
  const diff = (new Date(ds) - TODAY) / 86400000;
  return diff < 0 ? 'del-late' : diff < 7 ? 'del-warn' : 'del-ok';
}
function statusLabel(s) {
  const map = {
    moored:'⚓ Ormeggiata', navigation:'🚢 In navigazione',
    delay_risk:'⚠️ Rischio ritardo', on_time:'🟢 In orario',
    anchored:'⚓ All\'ancora', port:'🏭 In porto'
  };
  return map[s] || s || '—';
}

// ── STATUS DOT ────────────────────────────────────────────────────────
function reqDot(s){
  if(!s)return 'd-none';
  if(s.includes('Cancelled'))return 'd-red';
  if(s.includes('Price'))return 'd-yellow';
  if(s.includes('Ordered'))return 'd-green';
  return 'd-blue';
}
function rfqDot(s,p){
  if(!s)return 'd-none';
  if(s.includes('Refused'))return 'd-red';
  if(s.includes('Acknowledged'))return p===100?'d-green':'d-blue';
  if(s.includes('Sent'))return 'd-yellow';
  return 'd-blue';
}
function poDot(s){
  if(!s)return 'd-none';
  if(s.includes('Cancelled'))return 'd-red';
  if(s.includes('Finalized'))return 'd-green';
  if(s.includes('Published'))return 'd-yellow';
  if(s.includes('Approved')||s.includes('Confirmed'))return 'd-blue';
  return 'd-blue';
}
function dnDot(s){
  if(!s)return 'd-none';
  if(s.includes('Received'))return 'd-green';
  if(s.includes('Shipped'))return 'd-cyan';
  if(s.includes('Ready'))return 'd-purple';
  return 'd-blue';
}
function short(s,prefix){
  if(!s)return '—';
  return s.replace(prefix+' ','');
}
function isOn(s){return !!s&&!s.includes('Cancelled');}
function rfqBarCls(p){return p===100?'p100':p===0?'p0':'p50';}

// ── FLAGS FILTRO ──────────────────────────────────────────────────────
function getFlags(item){
  const hasPO   = !!item.poStatus && !item.poStatus.includes('Cancelled');
  const rfqOpen = (item.rfqIssued||0)>(item.rfqClosed||0) && !!item.rfqStatus && !hasPO;
  return {
    rfqOpen,
    overdue   : rfqOpen && (item.rfqDays||0)>7 && !hasPO,
    readyForPO: (item.rfqStatus||'').includes('Acknowledged') && !item.poStatus,
    poNoDN    : !!item.poStatus && !item.poStatus.includes('Cancelled') && !item.dnStatus,
    dnTransit : !!(item.dnStatus||'').match(/Shipped|Ready/),
    cancelled : !!(item.reqStatus||'').includes('Cancelled')
             || !!(item.poStatus||'').includes('Cancelled'),
  };
}

let allRows = [];
function applyFilter(f){
  let n=0;
  allRows.forEach(({el,fl})=>{
    const show =
      f==='all'        ? true       :
      f==='rfq-open'   ? fl.rfqOpen :
      f==='overdue'    ? fl.overdue :
      f==='ready-po'   ? fl.readyForPO :
      f==='po-no-dn'   ? fl.poNoDN  :
      f==='dn-transit' ? fl.dnTransit :
      f==='cancelled'  ? fl.cancelled : true;
    el.classList.toggle('hidden-row',!show);
    if(show)n++;
  });
  document.getElementById('f-count').textContent = n+' items';
}
document.querySelectorAll('.fb-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    applyFilter(b.dataset.f);
  });
});

// ── MAIN ──────────────────────────────────────────────────────────────
async function init(){
  const vesselId = new URLSearchParams(location.search).get('vessel')||'';

  // carica entrambi i JSON in parallelo
  let fleet={vessels:[]}, proc={vessels:[]};
  try{
    const [r1,r2] = await Promise.all([
      fetch('data-fleet.json?t='+Date.now()),
      fetch('data-procurement.json?t='+Date.now())
    ]);
    if(r1.ok) fleet = await r1.json();
    if(r2.ok) proc  = await r2.json();
  } catch(e){
    console.warn('Errore JSON:',e);
  }

  // sync label (dal più recente)
  const syncSrc = proc.lastSync || fleet.lastSync;
  if(syncSrc){
    const d=new Date(syncSrc);
    document.getElementById('vd-sync').textContent =
      'Sync '+d.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  // trova nave fleet
  const fv = fleet.vessels.find(x=>x.id===vesselId) || fleet.vessels[0];
  // trova nave procurement
  const pv = proc.vessels.find(x=>x.vesselId===vesselId)
          || proc.vessels.find(x=>x.vesselId===(fv&&fv.id))
          || proc.vessels[0];

  // ── TOPBAR ──────────────────────────────────────────────────────────
  const col = fv ? fv.statusColor : (pv ? pv.deliveryColor : 'green');
  const badgeCol = col==='red'?'red':col==='yellow'?'yellow':'green';
  document.title = (fv?fv.name:pv?pv.vesselName:'Nave')+' · Maritime HQ';
  document.getElementById('vd-name').textContent = '🚢 '+(fv?fv.name:pv?pv.vesselName:'—');
  const badge = document.getElementById('vd-badge');
  badge.textContent = col==='red'?'🔴 Ritardo':col==='yellow'?'🟡 A rischio':'🟢 In linea';
  badge.className = 'vd-badge b-'+badgeCol;

  // ── SEZIONE NAVE ────────────────────────────────────────────────────
  const viEl = document.getElementById('vessel-info');
  if(fv){
    viEl.innerHTML = `
      <div class="vi-card">
        <h3>📋 Dati nave</h3>
        <div class="vi-row"><span class="vi-lbl">Nome</span><span class="vi-val">${fv.name}</span></div>
        <div class="vi-row"><span class="vi-lbl">IMO</span><span class="vi-val">${fv.imo||'—'}</span></div>
        <div class="vi-row"><span class="vi-lbl">Stato</span>
          <span class="vi-val ${fv.statusColor||''}">${statusLabel(fv.status)}</span></div>
        <div class="vi-row"><span class="vi-lbl">Posizione</span><span class="vi-val">${fv.position||'—'}</span></div>
        <div class="vi-row"><span class="vi-lbl">Prossimo porto</span><span class="vi-val">${fv.nextPort||'—'}</span></div>
        <div class="vi-row"><span class="vi-lbl">Last Noon Report</span>
          <span class="vi-val">${fmtDateTime(fv.lastNoonReport)}</span></div>
      </div>
      <div class="vi-card">
        <h3>🏢 Agente & contatti</h3>
        <div class="vi-row"><span class="vi-lbl">Agente</span><span class="vi-val">${fv.agent||'—'}</span></div>
        <div class="vi-row"><span class="vi-lbl">Tel</span><span class="vi-val">${fv.agentContact||'—'}</span></div>
        <div class="vi-row"><span class="vi-lbl">Località</span><span class="vi-val">${fv.location||'—'}</span></div>
      </div>
      <div class="eta-strip">
        <div class="eta-box ${etaClass(fv.eta)}">
          <div class="eta-lbl">⏩ ETA</div>
          <div class="eta-date">${fmtDate(fv.eta)}</div>
          <div class="eta-time">${fv.eta?new Date(fv.eta).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
        <div class="eta-box ${etaClass(fv.etb)}">
          <div class="eta-lbl">⚓ ETB</div>
          <div class="eta-date">${fmtDate(fv.etb)}</div>
          <div class="eta-time">${fv.etb?new Date(fv.etb).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
        <div class="eta-box ${etaClass(fv.etd)}">
          <div class="eta-lbl">🚀 ETD</div>
          <div class="eta-date">${fmtDate(fv.etd)}</div>
          <div class="eta-time">${fv.etd?new Date(fv.etd).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
      </div>
    `;
  } else {
    viEl.innerHTML = '<div class="empty" style="grid-column:1/-1;color:#475569">Dati nave non disponibili (data-fleet.json)</div>';
  }

  // ── ALERTS NAVE ─────────────────────────────────────────────────────
  const vaEl = document.getElementById('vessel-alerts');
  if(fv && fv.alerts && fv.alerts.length){
    vaEl.innerHTML = fv.alerts.map(a=>
      `<div class="va ${a.type}">${a.type==='crit'?'🔴':'🟡'} ${a.message}</div>`
    ).join('');
  }

  if(!pv){
    document.getElementById('items-list').innerHTML =
      '<div class="empty" style="color:#ef4444">⚠️ Dati procurement non trovati per questa nave.</div>';
    return;
  }

  // ── KPI PROCUREMENT ─────────────────────────────────────────────────
  const pctRfq = pv.totalReq>0 ? Math.round((pv.rfqOpen/pv.totalReq)*100) : 0;
  const pctDN  = pv.orders>0   ? Math.round((pv.dn/pv.orders)*100)         : 0;

  document.getElementById('k-req').textContent    = pv.totalReq    ||0;
  document.getElementById('k-rfqo').textContent   = pv.rfqOpen     ||0;
  document.getElementById('k-rfqo-b').style.width = pctRfq+'%';
  document.getElementById('k-over').textContent   = pv.rfqOverdue7 ||0;
  document.getElementById('k-r2p').textContent    = (pv.pctReqToPO ||0)+'%';
  document.getElementById('k-r2p-b').style.width  = (pv.pctReqToPO ||0)+'%';
  document.getElementById('k-po').textContent     = pv.orders      ||0;
  document.getElementById('k-po-b').style.width   = (pv.pctReqToPO ||0)+'%';
  document.getElementById('k-p2d').textContent    = (pv.pctPOToDN  ||0)+'%';
  document.getElementById('k-p2d-b').style.width  = (pv.pctPOToDN  ||0)+'%';
  document.getElementById('k-dn').textContent     = pv.dnPending   ||0;
  document.getElementById('k-dn-b').style.width   = pctDN+'%';
  document.getElementById('k-rdy').textContent    = pv.readyForPO  ||0;

  // ── LISTA ITEMS ──────────────────────────────────────────────────────
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  allRows = [];

  if(!pv.items||pv.items.length===0){
    list.innerHTML='<div class="empty">Nessun item disponibile.</div>';
    return;
  }

  pv.items.forEach((item,i)=>{
    const pct = item.rfqPct||0;
    const fl  = getFlags(item);
    const dc  = delClass(item.deliveryDate);

    // N° REQ e N° PO estratti dall'id o da campi dedicati
    const reqNum = item.reqNum || (item.id ? '#'+item.id.split(' ').pop() : '—');
    const poNum  = item.poNum  || (item.poStatus && !item.poStatus.includes('Cancelled')
                    ? (item.poRef||'PO') : '—');

    const el = document.createElement('div');
    el.className = 'item-row';
    el.innerHTML = `
      <div class="item-top">
        <span class="item-num">${i+1}</span>
        <div class="item-ids">
          <span class="item-reqid" title="N° REQ">REQ ${reqNum}</span>
          <span class="item-poid"  title="N° PO">PO ${poNum}</span>
        </div>
        <span class="item-desc" title="${item.description||''}">${item.description||'—'}</span>
        <span class="item-sup"  title="${item.supplier||'—'}">${item.supplier||'—'}</span>
        <span class="item-date ${dc}">${fmtDate(item.deliveryDate)}</span>
      </div>
      <div class="item-pipe">
        <div class="step">
          <div class="step-dot ${reqDot(item.reqStatus)}"></div>
          <span class="step-lbl ${isOn(item.reqStatus)?'on':''}">REQ · ${short(item.reqStatus,'REQ')}</span>
        </div>
        <span class="pipe-arr">›</span>
        <div class="step">
          <div class="step-dot ${rfqDot(item.rfqStatus,pct)}"></div>
          <span class="step-lbl ${isOn(item.rfqStatus)?'on':''}">RFQ · ${short(item.rfqStatus,'RFQ')}</span>
        </div>
        <div class="rfq-wrap">
          <div class="rfq-track">
            <div class="rfq-fill ${rfqBarCls(pct)}" style="width:${pct}%"></div>
          </div>
          <span class="rfq-pct">${item.rfqClosed||0}/${item.rfqIssued||0}</span>
        </div>
        <span class="pipe-arr">›</span>
        <div class="step">
          <div class="step-dot ${poDot(item.poStatus)}"></div>
          <span class="step-lbl ${isOn(item.poStatus)?'on':''}">PO · ${short(item.poStatus,'PO')}</span>
        </div>
        <span class="pipe-arr">›</span>
        <div class="step">
          <div class="step-dot ${dnDot(item.dnStatus)}"></div>
          <span class="step-lbl ${isOn(item.dnStatus)?'on':''}">DN · ${short(item.dnStatus,'DN')}</span>
        </div>
      </div>
    `;
    list.appendChild(el);
    allRows.push({el,fl});
  });

  document.getElementById('f-count').textContent = pv.items.length+' items';
}

init();
</script>
</body>
</html>
