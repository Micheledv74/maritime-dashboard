<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel Detail · Maritime HQ</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060e18; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    /* ── TOPBAR ── */
    .vd-topbar {
      background: #0a1628; border-bottom: 1px solid #1a2e45;
      padding: 14px 24px; display: flex; align-items: center;
      gap: 16px; position: sticky; top: 0; z-index: 100;
    }
    .vd-back { color: #38bdf8; text-decoration: none; font-size: 0.88rem; display: flex; align-items: center; gap: 4px; }
    .vd-back:hover { color: #7dd3fc; }
    .vd-vessel-name { font-size: 1.1rem; font-weight: 700; }
    .vd-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-left: 8px; }
    .b-red    { background: rgba(239,68,68,.15);  color: #ef4444; }
    .b-yellow { background: rgba(245,158,11,.15); color: #f59e0b; }
    .b-green  { background: rgba(34,197,94,.15);  color: #22c55e; }
    .vd-sync  { margin-left: auto; font-size: 0.75rem; color: #64748b; }

    /* ── KPI STRIP ── */
    .kpi-strip {
      display: flex; gap: 10px; padding: 16px 24px;
      overflow-x: auto; background: #080f1c;
      border-bottom: 1px solid #1a2e45;
    }
    .ks { background: #0b1623; border: 1px solid #1a2e45; border-radius: 10px;
          padding: 10px 16px; min-width: 90px; text-align: center; flex-shrink: 0; }
    .ks-num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .ks-lbl { font-size: 0.6rem; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }
    .ks-bar  { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .ks-fill { height: 100%; border-radius: 2px; }
    .kf-blue   { background: linear-gradient(90deg,#1d4ed8,#3b82f6); }
    .kf-green  { background: linear-gradient(90deg,#15803d,#22c55e); }
    .kf-orange { background: linear-gradient(90deg,#c2410c,#f97316); }
    .kf-purple { background: linear-gradient(90deg,#6d28d9,#a78bfa); }
    .kf-gray   { background: #334155; }

    /* ── FILTRI ── */
    .filter-bar {
      display: flex; gap: 8px; padding: 12px 24px;
      flex-wrap: wrap; border-bottom: 1px solid #1a2e45;
      background: #080f1c;
    }
    .fb { background: #0b1623; border: 1px solid #1a2e45; color: #94a3b8;
          padding: 5px 12px; border-radius: 20px; font-size: 0.72rem;
          cursor: pointer; transition: all .15s; user-select: none; }
    .fb:hover, .fb.active { background: #1e3a8a; border-color: #3b82f6; color: #93c5fd; }
    .fb.f-red.active    { background: rgba(239,68,68,.2); border-color: #ef4444; color: #ef4444; }
    .fb.f-yellow.active { background: rgba(245,158,11,.2); border-color: #f59e0b; color: #f59e0b; }
    .fb.f-green.active  { background: rgba(34,197,94,.2); border-color: #22c55e; color: #22c55e; }
    .filter-count { font-size: 0.72rem; color: #64748b; margin-left: auto; align-self: center; }

    /* ── TABELLA ── */
    .vd-table-wrap { padding: 16px 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    thead th {
      background: #0a1628; color: #64748b; font-size: 0.62rem;
      text-transform: uppercase; letter-spacing: .5px;
      padding: 8px 10px; border-bottom: 1px solid #1a2e45;
      text-align: left; white-space: nowrap; position: sticky; top: 56px;
    }
    tbody tr { border-bottom: 1px solid #0f1d2e; transition: background .1s; }
    tbody tr:hover { background: #0d1a2a; }
    td { padding: 9px 10px; vertical-align: middle; }

    /* descrizione */
    .td-desc { max-width: 220px; }
    .td-desc-main { font-weight: 600; font-size: 0.78rem; color: #cbd5e1;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-desc-sup  { font-size: 0.65rem; color: #475569; margin-top: 1px;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

    /* pipeline pills */
    .pipeline-row { display: flex; align-items: center; gap: 3px; }
    .pp { font-size: 0.62rem; font-weight: 700; padding: 2px 7px;
          border-radius: 4px; white-space: nowrap; }
    .pp-arr { color: #334155; font-size: 0.7rem; }

    /* colori status */
    .s-none    { background: #1e293b; color: #475569; }
    .s-sourcing{ background: rgba(99,102,241,.2); color: #a5b4fc; }
    .s-sent    { background: rgba(245,158,11,.15); color: #fcd34d; }
    .s-ack     { background: rgba(34,197,94,.15);  color: #86efac; }
    .s-refused { background: rgba(239,68,68,.15);  color: #fca5a5; }
    .s-approved{ background: rgba(59,130,246,.15); color: #93c5fd; }
    .s-created { background: rgba(99,102,241,.15); color: #c4b5fd; }
    .s-confirmed{ background: rgba(34,197,94,.15); color: #86efac; }
    .s-published{ background: rgba(245,158,11,.2); color: #fcd34d; }
    .s-finalized{ background: rgba(34,197,94,.2);  color: #4ade80; }
    .s-cancelled{ background: rgba(100,116,139,.2);color: #94a3b8; text-decoration: line-through; }
    .s-ready   { background: rgba(168,85,247,.2);  color: #d8b4fe; }
    .s-shipped { background: rgba(59,130,246,.2);  color: #7dd3fc; }
    .s-received{ background: rgba(34,197,94,.3);   color: #4ade80; }
    .s-ordered { background: rgba(34,197,94,.1);   color: #86efac; }
    .s-endorsed{ background: rgba(245,158,11,.1);  color: #fcd34d; }
    .s-price   { background: rgba(99,102,241,.15); color: #a5b4fc; }

    /* barra rfq% */
    .rfq-cell { min-width: 80px; }
    .rfq-top  { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 0.65rem; color: #64748b; }
    .rfq-track{ height: 5px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    .rfq-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#1d4ed8,#3b82f6); }
    .rfq-fill.pct-100 { background: linear-gradient(90deg,#15803d,#22c55e); }
    .rfq-fill.pct-0   { background: #334155; }

    /* delivery */
    .del-ok   { color: #4ade80; }
    .del-warn { color: #f59e0b; }
    .del-late { color: #ef4444; }
    .del-none { color: #475569; }

    /* riga nascosta */
    tr.hidden-row { display: none; }

    /* empty state */
    .empty-state { padding: 40px; text-align: center; color: #475569; font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="vd-topbar">
  <a class="vd-back" href="index.html">← Dashboard</a>
  <span class="vd-vessel-name" id="vd-name">—</span>
  <span class="vd-badge" id="vd-badge">—</span>
  <span class="vd-sync" id="vd-sync">—</span>
</div>

<div class="kpi-strip" id="kpi-strip">
  <div class="ks">
    <div class="ks-num" id="ks-req" style="color:#a5b4fc;">—</div>
    <div class="ks-lbl">REQ totali</div>
    <div class="ks-bar"><div class="ks-fill kf-purple" style="width:100%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-rfq-open" style="color:#fcd34d;">—</div>
    <div class="ks-lbl">RFQ aperte</div>
    <div class="ks-bar"><div class="ks-fill kf-blue" id="ks-rfq-bar" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-overdue" style="color:#ef4444;">—</div>
    <div class="ks-lbl">RFQ &gt;7gg</div>
    <div class="ks-bar"><div class="ks-fill kf-gray" style="width:100%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-rfq2po" style="color:#38bdf8;">—</div>
    <div class="ks-lbl">REQ→PO %</div>
    <div class="ks-bar"><div class="ks-fill kf-blue" id="ks-rfq2po-bar" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-po" style="color:#4ade80;">—</div>
    <div class="ks-lbl">PO attivi</div>
    <div class="ks-bar"><div class="ks-fill kf-green" id="ks-po-bar" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-po2dn" style="color:#f97316;">—</div>
    <div class="ks-lbl">PO→DN %</div>
    <div class="ks-bar"><div class="ks-fill kf-orange" id="ks-po2dn-bar" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-dn" style="color:#7dd3fc;">—</div>
    <div class="ks-lbl">DN transit</div>
    <div class="ks-bar"><div class="ks-fill kf-blue" id="ks-dn-bar" style="width:0%"></div></div>
  </div>
  <div class="ks">
    <div class="ks-num" id="ks-ready" style="color:#d8b4fe;">—</div>
    <div class="ks-lbl">Pronti PO</div>
    <div class="ks-bar"><div class="ks-fill kf-purple" style="width:100%"></div></div>
  </div>
</div>

<div class="filter-bar">
  <button class="fb active" data-filter="all">Tutti</button>
  <button class="fb f-red"    data-filter="rfq-open">🔴 RFQ aperte</button>
  <button class="fb f-yellow" data-filter="overdue">⏳ Scadute &gt;7gg</button>
  <button class="fb f-yellow" data-filter="ready-po">📋 Pronte PO</button>
  <button class="fb f-yellow" data-filter="po-no-dn">📦 PO senza DN</button>
  <button class="fb f-green"  data-filter="dn-transit">🚢 DN in transit</button>
  <button class="fb"          data-filter="cancelled">🚫 Cancellati</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="vd-table-wrap">
  <table id="items-table">
    <thead>
      <tr>
        <th style="width:30px;">#</th>
        <th>Descrizione · Fornitore</th>
        <th>REQ</th>
        <th style="width:110px;">RFQ</th>
        <th style="width:80px;">RFQ%</th>
        <th>PO</th>
        <th>DN</th>
        <th>Consegna</th>
      </tr>
    </thead>
    <tbody id="items-body">
      <tr><td colspan="8" class="empty-state">Caricamento...</td></tr>
    </tbody>
  </table>
</div>

<script>
// ── STATUS → CSS class ──────────────────────────────────────────────────
function rfqClass(s) {
  if (!s) return 's-none';
  if (s.includes('Sent'))       return 's-sent';
  if (s.includes('Acknowledged'))return 's-ack';
  if (s.includes('Refused'))    return 's-refused';
  return 's-none';
}
function poClass(s) {
  if (!s) return 's-none';
  if (s.includes('Created'))    return 's-created';
  if (s.includes('Approved'))   return 's-approved';
  if (s.includes('Confirmed'))  return 's-confirmed';
  if (s.includes('Published'))  return 's-published';
  if (s.includes('Finalized'))  return 's-finalized';
  if (s.includes('Cancelled'))  return 's-cancelled';
  return 's-none';
}
function dnClass(s) {
  if (!s) return 's-none';
  if (s.includes('Ready'))      return 's-ready';
  if (s.includes('Shipped'))    return 's-shipped';
  if (s.includes('Received'))   return 's-received';
  return 's-none';
}
function reqClass(s) {
  if (!s) return 's-none';
  if (s.includes('Price Sourcing')) return 's-price';
  if (s.includes('Ordered'))    return 's-ordered';
  if (s.includes('Cancelled'))  return 's-cancelled';
  if (s.includes('Endorsed'))   return 's-endorsed';
  return 's-none';
}

function shortStatus(s) {
  if (!s) return '—';
  return s.replace('RFQ ','').replace('PO ','').replace('DN ','').replace('REQ ','');
}

function deliveryClass(dateStr) {
  if (!dateStr) return 'del-none';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (d - now) / 86400000;
  if (diff < 0)  return 'del-late';
  if (diff < 7)  return 'del-warn';
  return 'del-ok';
}
function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'});
}

// ── FILTRI ──────────────────────────────────────────────────────────────
let allRows = [];

function applyFilter(filter) {
  let shown = 0;
  allRows.forEach(({ tr, item }) => {
    let visible = false;
    switch(filter) {
      case 'all':       visible = true; break;
      case 'rfq-open':  visible = !!item.rfqOpen; break;
      case 'overdue':   visible = item.rfqOverdue7 > 0; break;
      case 'ready-po':  visible = item.readyForPO; break;
      case 'po-no-dn':  visible = item.poNoDN; break;
      case 'dn-transit':visible = item.dnPending; break;
      case 'cancelled': visible = (item.reqStatus||'').includes('Cancelled') || (item.poStatus||'').includes('Cancelled'); break;
      default: visible = true;
    }
    tr.classList.toggle('hidden-row', !visible);
    if (visible) shown++;
  });
  document.getElementById('filter-count').textContent = shown + ' righe';
}

document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

// ── MAIN ────────────────────────────────────────────────────────────────
async function init() {
  const params   = new URLSearchParams(location.search);
  const vesselId = params.get('vessel') || '';

  const res  = await fetch('data-procurement.json?t=' + Date.now());
  const data = await res.json();

  // Sync label
  if (data.lastSync) {
    const d = new Date(data.lastSync);
    document.getElementById('vd-sync').textContent =
      'Sync ' + d.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  const vessel = data.vessels.find(v => v.vesselId === vesselId) || data.vessels[0];
  if (!vessel) return;

  // Topbar
  document.title = vessel.vesselName + ' · Maritime HQ';
  document.getElementById('vd-name').textContent = '🚢 ' + vessel.vesselName;
  const col = vessel.deliveryColor || 'green';
  const badge = document.getElementById('vd-badge');
  badge.textContent = col==='red' ? '🔴 Ritardo' : col==='yellow' ? '🟡 A rischio' : '🟢 In linea';
  badge.className   = 'vd-badge b-' + col;

  // KPI strip
  const pctRfq = vessel.totalReq > 0 ? Math.round((vessel.rfqOpen / vessel.totalReq)*100) : 0;
  document.getElementById('ks-req').textContent         = vessel.totalReq;
  document.getElementById('ks-rfq-open').textContent    = vessel.rfqOpen;
  document.getElementById('ks-rfq-bar').style.width     = pctRfq + '%';
  document.getElementById('ks-overdue').textContent     = vessel.rfqOverdue7;
  document.getElementById('ks-rfq2po').textContent      = vessel.pctReqToPO + '%';
  document.getElementById('ks-rfq2po-bar').style.width  = vessel.pctReqToPO + '%';
  document.getElementById('ks-po').textContent          = vessel.orders;
  document.getElementById('ks-po-bar').style.width      = vessel.pctReqToPO + '%';
  document.getElementById('ks-po2dn').textContent       = vessel.pctPOToDN + '%';
  document.getElementById('ks-po2dn-bar').style.width   = vessel.pctPOToDN + '%';
  document.getElementById('ks-dn').textContent          = vessel.dnPending;
  document.getElementById('ks-dn-bar').style.width      = vessel.orders > 0 ? Math.round((vessel.dn/vessel.orders)*100)+'%' : '0%';
  document.getElementById('ks-ready').textContent       = vessel.readyForPO;

  // Tabella
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = '';
  allRows = [];

  vessel.items.forEach((item, idx) => {
    const rfqPct  = item.rfqPct || 0;
    const pctCls  = rfqPct === 100 ? 'pct-100' : rfqPct === 0 ? 'pct-0' : '';
    const delCls  = deliveryClass(item.deliveryDate);

    // flag per filtri
    const isRfqOpen   = item.rfqIssued > item.rfqClosed && !!item.rfqStatus;
    const isOverdue   = (item.rfqDays||0) > 7 && isRfqOpen;
    const isReadyForPO= (item.rfqStatus||'').includes('Acknowledged') && !(item.poStatus);
    const isPoNoDN    = !!(item.poStatus) && !item.dnStatus;
    const isDnPending = (item.dnStatus||'').includes('Shipped') || (item.dnStatus||'').includes('Ready');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#334155;font-size:0.65rem;">${idx+1}</td>
      <td class="td-desc">
        <div class="td-desc-main" title="${item.description}">${item.description}</div>
        <div class="td-desc-sup">${item.supplier || '—'}</div>
      </td>
      <td><span class="pp ${reqClass(item.reqStatus)}">${shortStatus(item.reqStatus)}</span></td>
      <td>
        <div class="pipeline-row">
          <span class="pp ${rfqClass(item.rfqStatus)}" title="${item.rfqStatus||'—'}">${shortStatus(item.rfqStatus)}</span>
        </div>
      </td>
      <td class="rfq-cell">
        <div class="rfq-top"><span>${item.rfqClosed}/${item.rfqIssued}</span><span>${rfqPct}%</span></div>
        <div class="rfq-track"><div class="rfq-fill ${pctCls}" style="width:${rfqPct}%"></div></div>
      </td>
      <td><span class="pp ${poClass(item.poStatus)}">${shortStatus(item.poStatus)}</span></td>
      <td><span class="pp ${dnClass(item.dnStatus)}">${shortStatus(item.dnStatus)}</span></td>
      <td class="${delCls}" style="font-size:0.75rem;font-weight:600;">${formatDate(item.deliveryDate)}</td>
    `;

    tbody.appendChild(tr);
    allRows.push({
      tr, item: {
        ...item,
        rfqOpen: isRfqOpen,
        rfqOverdue7: isOverdue ? 1 : 0,
        readyForPO: isReadyForPO,
        poNoDN: isPoNoDN,
        dnPending: isDnPending
      }
    });
  });

  document.getElementById('filter-count').textContent = vessel.items.length + ' righe';
}

init().catch(e => {
  document.getElementById('items-body').innerHTML =
    `<tr><td colspan="8" class="empty-state" style="color:#ef4444;">⚠️ Errore: ${e.message}</td></tr>`;
});
</script>
</body>
</html>
